name: Build and Deploy Frontend

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # PR Checks (also run on push)
      - name: Run lint
        run: npm run lint

      - name: Run type-check
        run: npm run type-check

      # Build React App
      - name: Build React app
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: dist/
          retention-days: 1

      # Deploy only on push to main or manual runs (not PRs)
      - name: Configure AWS credentials
        if: github.event_name != 'pull_request'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to S3 (sync dist/)
        if: github.event_name != 'pull_request'
        run: aws s3 sync dist/ "s3://${{ secrets.FRONTEND_BUCKET_NAME }}" --delete

      - name: Invalidate CloudFront
        if: github.event_name != 'pull_request'
        run: aws cloudfront create-invalidation --distribution-id "${{ secrets.FRONTEND_CLOUDFRONT_DISTRIBUTION_ID }}" --paths "/*"
